services:

  app1:
    build: ./app
    ports:
      - "3001:3000"
    volumes:
      - ./app:/app

  app2:
    build: ./app
    ports:
      - "3002:3000"
    volumes:
      - ./app:/app

  app3:
    build: ./app
    ports:
      - "3003:3000"
    volumes:
      - ./app:/app

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

  
  redis:
    image: redis:latest
    ports:
      - "6379:6379"